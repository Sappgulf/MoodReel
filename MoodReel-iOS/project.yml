name: MoodReel
options:
  bundleIdPrefix: com.moodreel
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_BITCODE: NO
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1

targets:
  MoodReel:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoodReel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moodreel.app
        INFOPLIST_FILE: MoodReel/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
    info:
      path: MoodReel/Info.plist
      properties:
        CFBundleName: MoodReel
        CFBundleDisplayName: MoodReel
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIRequiresFullScreen: false
        LSApplicationQueriesSchemes:
          - youtube
        UIBackgroundModes: []
  MoodReelTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoodReelTests
    dependencies:
      - target: MoodReel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moodreel.app.tests
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MoodReel.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MoodReel"
