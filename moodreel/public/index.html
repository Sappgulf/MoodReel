<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#09090b" />
  <meta name="description"
    content="MoodReel - Discover movies and TV shows that match your mood. Get personalized recommendations based on how you're feeling." />
  <meta name="keywords" content="movies, TV shows, mood, recommendations, streaming, what to watch" />

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MoodReel" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="MoodReel – Discover Movies & TV by Mood" />
  <meta property="og:description"
    content="Find the perfect movie or TV show for your mood. Personalized recommendations at your fingertips." />
  <meta property="og:site_name" content="MoodReel" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="MoodReel – Discover Movies & TV by Mood" />
  <meta name="twitter:description" content="Find the perfect movie or TV show for your mood." />

  <title>MoodReel – Discover Movies & TV by Mood</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <!-- Register service worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('SW registered:', registration.scope);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>

</html>
